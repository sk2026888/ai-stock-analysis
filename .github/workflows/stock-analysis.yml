name: AI Stock Analysis

# 触发规则：每天UTC8点（北京时间16点）+ 手动触发
on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  analyze-stock:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run stock analysis
        run: python stock_analysis.py

      - name: Commit report to repo
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add analysis_report.md
          # 仅当文件有变化时提交（避免空提交）
          git diff --quiet && git diff --staged --quiet || git commit -m "Update stock report $(date +'%Y-%m-%d')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
